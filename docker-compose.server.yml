# 生产环境 Docker Compose
# 使用方式：docker compose -f docker-compose.server.yml up -d --build
# PostgreSQL 和 Redis 复用 LeadMine 已有的容器，通过 leadmine_default 网络连接

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: globaleads-backend
    restart: unless-stopped
    ports:
      - "8002:8002"
    env_file:
      - ./backend/.env
    environment:
      - PORT=8002
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs:/app/logs
    networks:
      - leadmine_default

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: globaleads-celery
    restart: unless-stopped
    env_file:
      - ./backend/.env
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=1 -Q globaleads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs:/app/logs
    networks:
      - leadmine_default

networks:
  leadmine_default:
    external: true
