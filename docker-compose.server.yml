# 生产环境 Docker Compose
# 使用方式：docker compose -f docker-compose.server.yml up -d --build
# PostgreSQL 和 Redis 复用 已有的 PostgreSQL 和 Redis 容器，通过 app_network 网络连接

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: globaleads-backend
    restart: unless-stopped
    ports:
      - "8002:8002"
    env_file:
      - ./backend/.env
    environment:
      - PORT=8002
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs:/app/logs
    networks:
      - app_network
    mem_limit: 256m
    memswap_limit: 320m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: globaleads-celery
    restart: unless-stopped
    env_file:
      - ./backend/.env
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=1 -Q globaleads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs:/app/logs
    networks:
      - app_network
    mem_limit: 256m
    memswap_limit: 320m
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks.celery_app inspect ping --timeout 10 || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

networks:
  app_network:
    external: true
